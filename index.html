<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torn City - Forum Post Builder</title>
    <!-- Tailwind & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            /* Light Theme - Minimal */
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --card-bg-rgb: 255,255,255;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #e5e7eb;
            --divider: #f3f4f6;
            --success: #10b981;
            --danger: #ef4444;
        }

        body.dark-theme {
            /* Dark Theme - Minimal */
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --card-bg-rgb: 30,41,59;
            --text-main: #f1f5f9;
            --text-muted: #cbd5e1;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border: #334155;
            --divider: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.2s ease, color 0.2s ease;
            margin: 0;
            padding: 0;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .data-table th {
            background-color: var(--primary);
            color: white;
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: none;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .data-table tbody tr {
            transition: background-color 0.15s ease;
        }

        .data-table tbody tr:hover {
            background-color: var(--divider);
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        .custom-scroll {
            max-height: 420px;
            overflow-y: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .tab-active {
            color: var(--primary) !important;
            border-bottom: 2px solid var(--primary);
            background-color: transparent;
        }

        input, select, textarea {
            background-color: var(--card-bg) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border) !important;
            font-size: 14px !important;
            transition: border-color 0.2s ease !important;
            font-family: inherit !important;
        }

        input:focus, select:focus, textarea:focus {
            outline: none !important;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1) !important;
        }

        .preview-area {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
        }

        h3 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 0 0 12px 0;
            color: var(--primary);
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-muted);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Floating UI -->
    <div class="fixed top-4 right-4 z-50 flex items-center gap-3 p-2 bg-white dark:bg-slate-900 shadow-sm border border-gray-200 dark:border-gray-700 rounded-lg">
        <button onclick="clearData()" class="w-8 h-8 rounded flex items-center justify-center text-gray-400 hover:text-red-500 transition-colors" title="Clear Data">
            <i class="fa-solid fa-trash-can text-sm"></i>
        </button>
        <div class="w-px h-5 bg-gray-300 dark:bg-gray-600"></div>
        <button onclick="setTheme('light')" id="themeBtn-light" class="w-8 h-8 rounded flex items-center justify-center text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-colors">
            <i class="fa-solid fa-sun text-sm"></i>
        </button>
        <button onclick="setTheme('dark')" id="themeBtn-dark" class="w-8 h-8 rounded flex items-center justify-center text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-colors">
            <i class="fa-solid fa-moon text-sm"></i>
        </button>
    </div>

    <div class="max-w-[1200px] mx-auto px-4 py-4">
        <!-- Header -->
        <header class="mb-6">
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-1">Torn Forum Builder</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">Create professional job & recruitment posts</p>
        </header>

        <!-- Main Dashboard -->
        <div class="bg-white dark:bg-slate-800 rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
            <!-- Navigation -->
            <div class="flex border-b border-gray-200 dark:border-gray-700">
                <button onclick="switchTab('worker')" id="tab-worker" class="flex-1 px-6 py-3 text-sm font-semibold text-gray-700 dark:text-gray-300 border-b-2 border-transparent transition-all tab-active hover:text-gray-900 dark:hover:text-white">
                    <i class="fa-solid fa-user-tag mr-2"></i>Worker Stats
                </button>
                <button onclick="switchTab('hiring')" id="tab-hiring" class="flex-1 px-6 py-3 text-sm font-semibold text-gray-500 dark:text-gray-400 border-b-2 border-transparent transition-all hover:text-gray-700 dark:hover:text-gray-300">
                    <i class="fa-solid fa-briefcase mr-2"></i>Employer/Hiring
                </button>
            </div>

            <!-- Content -->
            <div class="p-6">
                <!-- Worker Section -->
                <div id="worker-content" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Left: Form -->
                    <div class="lg:col-span-1">
                        <!-- Stats Section -->
                        <div class="mb-4">
                            <h3>Your Statistics</h3>
                            <div class="space-y-3">
                                <div>
                                    <label>Manual</label>
                                    <input type="number" id="w-man" value="0" oninput="renderWorkerTable()" class="w-full px-3 py-2 rounded-lg border">
                                </div>
                                <div>
                                    <label>Intelligence</label>
                                    <input type="number" id="w-int" value="0" oninput="renderWorkerTable()" class="w-full px-3 py-2 rounded-lg border">
                                </div>
                                <div>
                                    <label>Endurance</label>
                                    <input type="number" id="w-end" value="0" oninput="renderWorkerTable()" class="w-full px-3 py-2 rounded-lg border">
                                </div>
                                <div>
                                    <label>Merits (Stats)</label>
                                    <select id="w-merit" onchange="renderWorkerTable()" class="w-full px-3 py-2 rounded-lg border">
                                        <option value="0">0/10 (+0%)</option>
                                        <script>for(let i=1;i<=10;i++) document.write(`<option value="${i}">${i}/10 (+${i}%)</option>`)</script>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Work Preference -->
                        <div class="mb-4">
                            <h3>Work Preference</h3>
                            <div class="space-y-2 mb-3">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="w-style" value="salary" checked> <span class="text-sm">Seeking Salary</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="w-style" value="tax"> <span class="text-sm">Prefer Tax</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="w-style" value="unpaid"> <span class="text-sm">Open to Free/Perks</span>
                                </label>
                            </div>
                            <textarea id="w-notes" rows="2" class="w-full px-3 py-2 rounded-lg border text-sm" placeholder="Additional notes..."></textarea>
                        </div>

                        <button onclick="generateWorkerHTML()" class="w-full px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors text-sm">
                            Generate Post
                        </button>
                    </div>

                    <!-- Right: Table & Results -->
                    <div class="lg:col-span-2 space-y-4">

                        <!-- Filter -->
                        <div class="flex gap-2">
                            <input type="text" id="w-filter-company" oninput="renderWorkerTable()" class="flex-1 px-3 py-2 rounded-lg border text-sm" placeholder="Filter Company...">
                            <input type="text" id="w-filter-position" oninput="renderWorkerTable()" class="flex-1 px-3 py-2 rounded-lg border text-sm" placeholder="Filter Position...">
                        </div>

                        <!-- Table -->
                        <div class="custom-scroll">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th style="width: 50px;">Select</th>
                                        <th onclick="sortWorkerTable('c')" class="cursor-pointer">Company</th>
                                        <th>Position</th>
                                        <th>Recommended Stats</th>
                                        <th onclick="sortWorkerTable('eff')" class="cursor-pointer">Your Eff</th>
                                    </tr>
                                </thead>
                                <tbody id="worker-table-body"></tbody>
                            </table>
                        </div>

                        <!-- Results -->
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="text-sm font-medium mb-2 block">HTML Forum Code</label>
                                <textarea id="w-html" readonly class="w-full h-40 px-3 py-2 rounded-lg border text-xs font-mono bg-gray-50 dark:bg-slate-900"></textarea>
                                <button onclick="copyToClipboard('w-html')" class="w-full mt-2 px-4 py-2 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg transition-colors text-sm">
                                    Copy Code
                                </button>
                            </div>
                            <div>
                                <label class="text-sm font-medium mb-2 block">Live Preview</label>
                                <div id="w-preview" class="preview-area h-40 overflow-auto p-4"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Hiring Section -->
                <div id="hiring-content" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Left: Form -->
                    <div class="lg:col-span-1">
                        <!-- Company Info -->
                        <div class="mb-4">
                            <h3>Company Info</h3>
                            <div class="space-y-3">
                                <div>
                                    <label>Company Type</label>
                                    <select id="h-company" onchange="renderHiringTable()" class="w-full px-3 py-2 rounded-lg border"></select>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div>
                                        <label>Stars</label>
                                        <select id="h-stars" class="w-full px-3 py-2 rounded-lg border">
                                            <script>for(let i=0;i<=10;i++) document.write(`<option value="${i}">${i} ⭐</option>`)</script>
                                        </select>
                                    </div>
                                    <div>
                                        <label>Target Eff (%)</label>
                                        <input type="number" id="h-eff" value="100" oninput="renderHiringTable()" class="w-full px-3 py-2 rounded-lg border">
                                    </div>
                                </div>
                                <div>
                                    <label>Application Link</label>
                                    <input type="text" id="h-link" class="w-full px-3 py-2 rounded-lg border text-sm" placeholder="https://www.torn.com/...">
                                </div>
                            </div>
                        </div>

                        <!-- Work Style -->
                        <div class="mb-4">
                            <h3>Work Style & Offer</h3>
                            <div class="space-y-2 mb-3">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="h-style" value="paying" checked> <span class="text-sm">Paying Salary</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="h-style" value="taxing"> <span class="text-sm">Tax Required</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="h-style" value="unpaid"> <span class="text-sm">Unpaid (Perk Only)</span>
                                </label>
                            </div>
                            <textarea id="h-perks" rows="2" class="w-full px-3 py-2 rounded-lg border text-sm" placeholder="Details, benefits..."></textarea>
                        </div>

                        <button onclick="generateHiringHTML()" class="w-full px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors text-sm">
                            Generate Post
                        </button>
                    </div>

                    <!-- Right: Table & Results -->
                    <div class="lg:col-span-2 space-y-4">
                        <!-- Table -->
                        <div class="custom-scroll">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th style="width: 50px;">Select</th>
                                        <th>Position</th>
                                        <th>Base Required</th>
                                        <th>For <span id="target-eff-display">100</span>% Eff</th>
                                    </tr>
                                </thead>
                                <tbody id="hiring-table-body"></tbody>
                            </table>
                        </div>

                        <!-- Results -->
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="text-sm font-medium mb-2 block">HTML Forum Code</label>
                                <textarea id="h-html" readonly class="w-full h-40 px-3 py-2 rounded-lg border text-xs font-mono bg-gray-50 dark:bg-slate-900"></textarea>
                                <button onclick="copyToClipboard('h-html')" class="w-full mt-2 px-4 py-2 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg transition-colors text-sm">
                                    Copy Code
                                </button>
                            </div>
                            <div>
                                <label class="text-sm font-medium mb-2 block">Live Preview</label>
                                <div id="h-preview" class="preview-area h-40 overflow-auto p-4"></div>
                            </div>
                        </div>
                    </div>
            </div>

            <!-- Footer -->
            <footer class="border-t border-gray-200 dark:border-gray-700 p-4 text-center text-sm text-gray-600 dark:text-gray-400">
                Dev by <span class="font-medium">Jules AI</span> | <a href="https://github.com/chaba-xciv/Torn_Job_Post" class="hover:underline">GitHub</a>
            </footer>
        </div>
    </div>

    <!-- Scripts -->
    <script src="company_specials.js"></script>
    <script src="company_positions.js"></script>
    <script>
        let jobsDB = [];
        let currentSort = { column: 'eff', asc: false };

        function init() {
            generateJobsDB();
            populateDropdowns();
            loadTheme();
            loadData();
            attachSaveListeners();
            renderWorkerTable();
            renderHiringTable();
        }

        function generateJobsDB() {
            jobsDB = [];
            for (const company in window.TORN_COMPANY_POSITIONS) {
                window.TORN_COMPANY_POSITIONS[company].forEach(pos => {
                    const stats = pos.recommended_stats;
                    const sorted = Object.entries(stats).sort((a, b) => b[1] - a[1]);
                    jobsDB.push({
                        c: company,
                        p: pos.rank,
                        reqP: sorted[0][1], typeP: sorted[0][0].toLowerCase(),
                        reqS: sorted[1][1], typeS: sorted[1][0].toLowerCase()
                    });
                });
            }
        }

        function populateDropdowns() {
            const hCompany = document.getElementById('h-company');
            const companies = [...new Set(jobsDB.map(job => job.c))].sort();
            companies.forEach(comp => hCompany.add(new Option(comp, comp)));
        }

        function switchTab(tab) {
            document.querySelectorAll('[id$="-content"]').forEach(c => c.classList.add('hidden'));
            document.getElementById(`${tab}-content`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('text-gray-500', 'dark:text-gray-400');
            });
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            document.getElementById(`tab-${tab}`).classList.remove('text-gray-500', 'dark:text-gray-400');
        }

        function getPartEff(stat, req) {
            if (req <= 0 || stat <= 0) return 0;
            const baseEff = Math.min(45, (45 / req) * stat);
            const bonus = Math.max(0, 5 * Math.log2(stat / req));
            return Math.floor(baseEff + bonus);
        }

        function renderWorkerTable() {
            const tbody = document.getElementById('worker-table-body');
            const man = parseFloat(document.getElementById('w-man').value) || 0;
            const int = parseFloat(document.getElementById('w-int').value) || 0;
            const end = parseFloat(document.getElementById('w-end').value) || 0;
            const merit = parseInt(document.getElementById('w-merit').value) || 0;
            const stats = { man, int, end };
            
            const filterComp = document.getElementById('w-filter-company').value.toLowerCase();
            const filterPos = document.getElementById('w-filter-position').value.toLowerCase();

            let data = jobsDB.map(job => {
                const eff = getPartEff(stats[job.typeP], job.reqP) + getPartEff(stats[job.typeS], job.reqS);
                return { ...job, eff };
            });

            if(filterComp) data = data.filter(j => j.c.toLowerCase().includes(filterComp));
            if(filterPos) data = data.filter(j => j.p.toLowerCase().includes(filterPos));

            data.sort((a, b) => {
                let vA = a[currentSort.column], vB = b[currentSort.column];
                if (typeof vA === 'string') { vA = vA.toLowerCase(); vB = vB.toLowerCase(); }
                return currentSort.asc ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
            });

            tbody.innerHTML = data.map(job => `
                <tr class="hover:bg-gray-100/50 dark:hover:bg-gray-700/20 transition-colors">
                    <td class="text-center"><input type="checkbox" class="worker-checkbox" value="${job.c}|${job.p}|${job.eff}"></td>
                    <td class="font-bold">${job.c}</td>
                    <td>${job.p}</td>
                    <td class="text-[10px] text-gray-500">${job.reqP.toLocaleString()} ${job.typeP.toUpperCase()} / ${job.reqS.toLocaleString()} ${job.typeS.toUpperCase()}</td>
                    <td class="text-center font-black text-blue-600">${job.eff}</td>
                </tr>
            `).join('');
        }

        function sortWorkerTable(col) {
            currentSort.asc = (currentSort.column === col) ? !currentSort.asc : (col !== 'eff');
            currentSort.column = col;
            renderWorkerTable();
        }

        function renderHiringTable() {
            const comp = document.getElementById('h-company').value;
            const targetEff = parseFloat(document.getElementById('h-eff').value) || 100;
            document.getElementById('target-eff-display').innerText = targetEff;
            
            const positions = jobsDB.filter(j => j.c === comp);
            const tbody = document.getElementById('hiring-table-body');

            tbody.innerHTML = positions.map(job => {
                const baseReqText = `${job.reqP.toLocaleString()} ${job.typeP.toUpperCase()} / ${job.reqS.toLocaleString()} ${job.typeS.toUpperCase()}`;
                
                let rP, rS;
                if (targetEff > 90) {
                    let mult = Math.pow(2, (targetEff - 90) / 10);
                    rP = Math.ceil(job.reqP * mult); rS = Math.ceil(job.reqS * mult);
                } else {
                    rP = Math.ceil((targetEff / 90) * job.reqP); rS = Math.ceil((targetEff / 90) * job.reqS);
                }
                const reqText = `${rP.toLocaleString()} ${job.typeP.toUpperCase()} / ${rS.toLocaleString()} ${job.typeS.toUpperCase()}`;
                return `
                    <tr class="hover:bg-gray-100/50 dark:hover:bg-gray-700/20 transition-colors">
                        <td class="text-center"><input type="checkbox" class="hiring-checkbox" value="${job.p}|${reqText}"></td>
                        <td class="font-bold">${job.p}</td>
                        <td class="text-gray-700 dark:text-gray-300 font-semibold">${baseReqText}</td>
                        <td class="font-black text-gray-800 dark:text-gray-100">${reqText}</td>
                    </tr>
                `;
            }).join('');
        }

        function generateWorkerHTML() {
            const man = document.getElementById('w-man').value;
            const int = document.getElementById('w-int').value;
            const end = document.getElementById('w-end').value;
            const merit = document.getElementById('w-merit').value;
            const style = document.querySelector('input[name="w-style"]:checked').value;
            const styleText = {salary: "Seeking Salary", tax: "Willing to Pay Tax", unpaid: "Unpaid/Perks"}[style];
            
            const selected = Array.from(document.querySelectorAll('.worker-checkbox:checked')).map(cb => {
                const [c, p, e] = cb.value.split('|');
                return `<li>${c} - ${p}: <b>${e}% eff</b> ${merit > 0 ? `(+${merit}% Merit)` : ''}</li>`;
            });

            const html = `
<div style="border: 1px solid #e8e8e8; border-radius: 12px; padding: 16px; max-width: 520px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6;">
    <h2 style="margin: 0 0 12px 0; font-size: 16px; font-weight: 600; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0;">📊 Worker Seeking Job</h2>
    <p style="margin: 8px 0; font-size: 14px;"><b>Stats:</b> MAN: ${Number(man).toLocaleString()} | INT: ${Number(int).toLocaleString()} | END: ${Number(end).toLocaleString()}</p>
    <p style="margin: 8px 0; font-size: 14px;"><b>Merits:</b> ${merit}/10 | <b>Pref:</b> ${styleText}</p>
    ${selected.length > 0 ? `<p style="margin: 8px 0; font-size: 14px;"><b>Targeting:</b></p><ul style="margin:4px 0; padding-left:20px; font-size: 14px;">${selected.join('')}</ul>` : '<p style="margin: 8px 0; font-size: 14px; font-style: italic;">Open to all offers!</p>'}
    ${document.getElementById('w-notes').value ? `<div style="margin-top: 12px; padding: 10px; background: #f9f9f9; border-left: 3px solid #ddd; font-size: 14px; border-radius: 4px;">${document.getElementById('w-notes').value.replace(/\n/g, '<br>')}</div>` : ''}
</div>`;
            document.getElementById('w-html').value = html.trim();
            document.getElementById('w-preview').innerHTML = html;
        }

        function generateHiringHTML() {
            const comp = document.getElementById('h-company').value;
            const eff = document.getElementById('h-eff').value;
            const stars = document.getElementById('h-stars').value;
            const link = document.getElementById('h-link').value;
            const style = document.querySelector('input[name="h-style"]:checked').value;
            const styleText = {paying: "Paying Salary", taxing: "Tax Required", unpaid: "Unpaid (Perk Only)"}[style];

            const selected = Array.from(document.querySelectorAll('.hiring-checkbox:checked')).map(cb => {
                const [p, r] = cb.value.split('|');
                return `<li><b>${p}</b>: Req Stats: <i>${r}</i></li>`;
            });

            let perksHTML = "";
            if(stars > 0 && window.TORN_COMPANY_SPECIALS[comp]) {
                const specials = window.TORN_COMPANY_SPECIALS[comp].filter(s => s.stars <= stars);
                perksHTML = `<p style="margin: 8px 0; font-size: 14px;"><b>Perks Unlocked (${stars}⭐):</b></p><ul style="margin: 4px 0; padding-left: 20px; font-size: 14px;">` + 
                    specials.map(s => `<li>${s.stars}⭐ ${s.name}: ${s.effect}</li>`).join('') + `</ul>`;
            }

            const html = `
<div style="border: 1px solid #e8e8e8; border-radius: 12px; padding: 16px; max-width: 520px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6;">
    <h2 style="margin: 0 0 12px 0; font-size: 16px; font-weight: 600; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0;">🏢 Hiring: ${comp} (${stars}⭐)</h2>
    <p style="margin: 8px 0; font-size: 14px;"><b>Target:</b> ${eff}% Efficiency | <b>Offer:</b> ${styleText}</p>
    ${selected.length > 0 ? `<p style="margin: 8px 0; font-size: 14px;"><b>Open Roles:</b></p><ul style="margin: 4px 0; padding-left: 20px; font-size: 14px;">${selected.join('')}</ul>` : ''}
    ${perksHTML}
    ${document.getElementById('h-perks').value ? `<div style="margin-top: 12px; padding: 10px; background: #f9f9f9; border-left: 3px solid #ddd; font-size: 14px; border-radius: 4px;"><b>Info:</b><br>${document.getElementById('h-perks').value.replace(/\n/g, '<br>')}</div>` : ''}
    ${link ? `<div style="text-align: center; margin-top: 14px;"><a href="${link}" style="display: inline-block; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: 500; font-size: 14px; border: 1px solid #e8e8e8; transition: all 0.2s;">Apply Here</a></div>` : ''}
</div>`;
            document.getElementById('h-html').value = html.trim();
            document.getElementById('h-preview').innerHTML = html;
        }

        function copyToClipboard(id) {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
            alert("Copied!");
        }

        function saveData() {
            const inputs = ['w-man', 'w-int', 'w-end', 'w-merit', 'w-notes', 'h-eff', 'h-link', 'h-perks', 'h-stars', 'h-company'];
            inputs.forEach(id => localStorage.setItem(id, document.getElementById(id).value));
            const wStyle = document.querySelector('input[name="w-style"]:checked');
            if(wStyle) localStorage.setItem('w-style', wStyle.value);
            const hStyle = document.querySelector('input[name="h-style"]:checked');
            if(hStyle) localStorage.setItem('h-style', hStyle.value);
        }

        function loadData() {
            const inputs = ['w-man', 'w-int', 'w-end', 'w-merit', 'w-notes', 'h-eff', 'h-link', 'h-perks', 'h-stars', 'h-company'];
            inputs.forEach(id => {
                const val = localStorage.getItem(id);
                if(val !== null) document.getElementById(id).value = val;
            });
            ['w-style', 'h-style'].forEach(name => {
                const val = localStorage.getItem(name);
                if(val) {
                    const rb = document.querySelector(`input[name="${name}"][value="${val}"]`);
                    if(rb) rb.checked = true;
                }
            });
        }

        function clearData() { if(confirm("Clear all?")) { localStorage.clear(); location.reload(); } }

        function setTheme(theme) {
            document.documentElement.classList.remove('dark');
            document.body.classList.remove('light-theme', 'dark-theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.body.classList.add('dark-theme');
            } else {
                document.body.classList.add('light-theme');
            }
            localStorage.setItem('site-theme', theme);
            const lBtn = document.getElementById('themeBtn-light'), dBtn = document.getElementById('themeBtn-dark');
            if(theme === 'dark') { 
                dBtn.classList.add('text-blue-500'); 
                lBtn.classList.remove('text-blue-500'); 
            } else { 
                lBtn.classList.add('text-blue-500'); 
                dBtn.classList.remove('text-blue-500'); 
            }
        }

        function loadTheme() {
            const saved = localStorage.getItem('site-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            setTheme(saved);
        }

        function attachSaveListeners() {
            document.querySelectorAll('input, select, textarea').forEach(el => {
                el.addEventListener('change', saveData);
                el.addEventListener('input', saveData);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
