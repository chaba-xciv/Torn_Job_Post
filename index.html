<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torn City - Forum Post Builder</title>
    <!-- Tailwind & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            /* Light Theme */
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --card-bg-rgb: 255,255,255;
            --text-main: #1a202c;
            --text-muted: #718096;
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --border: #cbd5e0;
            --highlight: #e6f2ff;
            --surface: #edf2f7;
            --success: #22863a;
            --danger: #ec2f45;
        }

        body.dark-theme {
            /* Dark Theme */
            --bg-color: #0d1117;
            --card-bg: #1c2128;
            --card-bg-rgb: 28,33,40;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --primary: #58a6ff;
            --primary-hover: #79c0ff;
            --border: #30363d;
            --highlight: #161b22;
            --surface: #0d1117;
            --success: #3fb950;
            --danger: #f85149;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        /* ป้องกันตารางดันขอบ */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .data-table {
            width: 100%;
            min-width: 600px; /* บังคับ Scroll แนวนอนถ้าจอแคบเกินไป */
        }

        .data-table th {
            background-color: var(--primary);
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 10px;
        }

        .data-table td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        /* ปรับความสูง Scrollbar */
        .custom-scroll {
            max-height: 400px;
            overflow-y: auto;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .tab-active {
            color: var(--primary) !important;
            border-bottom: 3px solid var(--primary);
            background-color: var(--highlight);
        }

        /* Glassmorphism for floating controls */
        .floating-ui {
            background: rgba(var(--card-bg-rgb), 0.88);
            backdrop-filter: blur(16px);
        }

        input, select, textarea {
            background-color: var(--card-bg) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border) !important;
        }

        .preview-area {
            background-color: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Floating UI -->
    <div class="fixed top-4 right-4 z-50 flex items-center gap-2 p-1.5 bg-white/90 dark:bg-slate-950/80 shadow-2xl rounded-full border border-slate-200 dark:border-slate-700">
        <button onclick="clearData()" class="w-8 h-8 rounded-full flex items-center justify-center text-red-500 hover:bg-red-50 transition-colors" title="Clear Data">
            <i class="fa-solid fa-trash-can text-sm"></i>
        </button>
        <div class="w-px h-5 bg-gray-300 dark:bg-gray-600"></div>
        <button onclick="setTheme('light')" id="themeBtn-light" class="w-8 h-8 rounded-full flex items-center justify-center transition-colors">
            <i class="fa-solid fa-sun text-sm"></i>
        </button>
        <button onclick="setTheme('dark')" id="themeBtn-dark" class="w-8 h-8 rounded-full flex items-center justify-center transition-colors">
            <i class="fa-solid fa-moon text-sm"></i>
        </button>
    </div>

    <div class="max-w-[1400px] mx-auto px-4 py-6">
        <!-- Header -->
        <header class="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-2xl font-black tracking-tight text-sky-600 dark:text-sky-400 uppercase">Torn Forum Builder</h1>
                <p class="text-sm text-slate-500 dark:text-slate-400">Generate professional job & recruitment posts</p>
            </div>
        </header>

        <!-- Main Dashboard -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden">
            <!-- Navigation -->
            <nav class="flex border-b border-gray-200 dark:border-gray-700">
                <button onclick="switchTab('worker')" id="tab-worker" class="flex-1 py-4 font-bold text-sm uppercase tracking-widest transition-all tab-active">
                    <i class="fa-solid fa-user-tag mr-2"></i>Worker Stats
                </button>
                <button onclick="switchTab('hiring')" id="tab-hiring" class="flex-1 py-4 font-bold text-sm uppercase tracking-widest transition-all text-gray-400">
                    <i class="fa-solid fa-briefcase mr-2"></i>Employer/Hiring
                </button>
            </nav>

            <!-- Content -->
            <div class="p-4 md:p-6">
                <!-- Worker Section -->
                <div id="worker-content" class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    <!-- Left: Form -->
                    <div class="lg:col-span-4 space-y-6">
                        <div class="bg-slate-50 dark:bg-slate-950/60 p-4 rounded-xl space-y-4 border border-slate-200 dark:border-slate-700">
                            <h3 class="font-bold text-sky-600 uppercase text-xs tracking-widest">1. Your Statistics</h3>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Manual</label>
                                    <input type="number" id="w-man" value="0" oninput="renderWorkerTable()" class="w-full p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Intelligence</label>
                                    <input type="number" id="w-int" value="0" oninput="renderWorkerTable()" class="w-full p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Endurance</label>
                                    <input type="number" id="w-end" value="0" oninput="renderWorkerTable()" class="w-full p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Merits (Stats)</label>
                                    <select id="w-merit" onchange="renderWorkerTable()" class="w-full p-2 rounded-lg text-sm outline-none">
                                        <option value="0">0/10 (+0%)</option>
                                        <script>for(let i=1;i<=10;i++) document.write(`<option value="${i}">${i}/10 (+${i}%)</option>`)</script>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="bg-gray-50 dark:bg-gray-900/50 p-4 rounded-xl border border-gray-100 dark:border-gray-800">
                            <h3 class="font-bold text-blue-600 uppercase text-xs tracking-widest mb-3">2. Work Preference</h3>
                            <div class="flex flex-wrap gap-2 mb-4">
                                <label class="flex-1 flex items-center justify-center gap-2 cursor-pointer bg-white dark:bg-gray-800 p-2 rounded-lg border border-gray-200 dark:border-gray-700">
                                    <input type="radio" name="w-style" value="salary" checked> <span class="text-xs">Salary</span>
                                </label>
                                <label class="flex-1 flex items-center justify-center gap-2 cursor-pointer bg-white dark:bg-gray-800 p-2 rounded-lg border border-gray-200 dark:border-gray-700">
                                    <input type="radio" name="w-style" value="tax"> <span class="text-xs">Pay Tax</span>
                                </label>
                                <label class="flex-1 flex items-center justify-center gap-2 cursor-pointer bg-white dark:bg-gray-800 p-2 rounded-lg border border-gray-200 dark:border-gray-700">
                                    <input type="radio" name="w-style" value="unpaid"> <span class="text-xs">Free</span>
                                </label>
                            </div>
                            <textarea id="w-notes" rows="2" class="w-full p-2 rounded-lg text-sm outline-none" placeholder="Add custom notes..."></textarea>
                        </div>

                        <button onclick="generateWorkerHTML()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-xl transition-all uppercase tracking-tighter">
                            Generate HTML Post
                        </button>
                    </div>

                    <!-- Right: Table & Results -->
                    <div class="lg:col-span-8 space-y-4 min-w-0"> <!-- min-w-0 ช่วยแก้ปัญหา Grid ล้นขอบ -->
                        <div class="flex gap-2">
                            <input type="text" id="w-filter-company" oninput="renderWorkerTable()" class="flex-1 p-2 rounded-lg text-sm border" placeholder="Filter Company...">
                            <input type="text" id="w-filter-position" oninput="renderWorkerTable()" class="flex-1 p-2 rounded-lg text-sm border" placeholder="Filter Position...">
                        </div>

                        <div class="table-responsive border border-gray-200 dark:border-gray-700 rounded-xl custom-scroll">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th style="width: 50px;">Select</th>
                                        <th onclick="sortWorkerTable('c')" class="cursor-pointer">Company ↕</th>
                                        <th>Position</th>
                                        <th>Recommended Stats</th>
                                        <th onclick="sortWorkerTable('eff')" class="cursor-pointer">Your Eff ↕</th>
                                    </tr>
                                </thead>
                                <tbody id="worker-table-body"></tbody>
                            </table>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-gray-400 uppercase">HTML Forum Code</label>
                                <textarea id="w-html" readonly class="w-full h-32 p-2 text-[10px] font-mono rounded-lg bg-gray-50 dark:bg-gray-900 border" placeholder="Code will appear here..."></textarea>
                                <button onclick="copyToClipboard('w-html')" class="w-full bg-emerald-600 text-white text-xs font-bold py-2 rounded-lg transition-colors">Copy Code</button>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Live Preview</label>
                                <div id="w-preview" class="preview-area w-full h-32 p-3 rounded-lg overflow-auto text-xs"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Hiring Section -->
                <div id="hiring-content" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6">
                    <!-- Left: Form -->
                    <div class="lg:col-span-4 space-y-4">
                        <div class="bg-gray-50 dark:bg-gray-900/50 p-4 rounded-xl space-y-3 border border-gray-100 dark:border-gray-800">
                            <h3 class="font-bold text-blue-600 uppercase text-xs tracking-widest">1. Company Info</h3>
                            <div class="space-y-3">
                                <div>
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Company Type</label>
                                    <select id="h-company" onchange="renderHiringTable()" class="w-full p-2 rounded-lg text-sm outline-none"></select>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div>
                                        <label class="text-[10px] font-bold text-gray-400 uppercase">Stars</label>
                                        <select id="h-stars" class="w-full p-2 rounded-lg text-sm outline-none">
                                            <script>for(let i=0;i<=10;i++) document.write(`<option value="${i}">${i} ⭐</option>`)</script>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="text-[10px] font-bold text-gray-400 uppercase">Target Eff (%)</label>
                                        <input type="number" id="h-eff" value="100" oninput="renderHiringTable()" class="w-full p-2 rounded-lg text-sm outline-none">
                                    </div>
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Application Link</label>
                                    <input type="text" id="h-link" class="w-full p-2 rounded-lg text-sm outline-none" placeholder="https://www.torn.com/...">
                                </div>
                            </div>
                        </div>

                        <div class="bg-gray-50 dark:bg-gray-900/50 p-4 rounded-xl border border-gray-100 dark:border-gray-800">
                            <h3 class="font-bold text-blue-600 uppercase text-xs tracking-widest mb-3">2. Work Style & Offer</h3>
                            <div class="flex gap-2 mb-3">
                                <label class="flex-1 flex items-center justify-center gap-1 cursor-pointer bg-white dark:bg-gray-800 p-2 rounded-lg border border-gray-200 dark:border-gray-700">
                                    <input type="radio" name="h-style" value="paying" checked> <span class="text-[10px]">Salary</span>
                                </label>
                                <label class="flex-1 flex items-center justify-center gap-1 cursor-pointer bg-white dark:bg-gray-800 p-2 rounded-lg border border-gray-200 dark:border-gray-700">
                                    <input type="radio" name="h-style" value="taxing"> <span class="text-[10px]">Tax</span>
                                </label>
                            </div>
                            <textarea id="h-perks" rows="2" class="w-full p-2 rounded-lg text-sm outline-none" placeholder="Trains, pay details..."></textarea>
                        </div>

                        <button onclick="generateHiringHTML()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl uppercase tracking-tighter">
                            Generate Recruitment Post
                        </button>
                    </div>

                    <!-- Right: Table & Results -->
                    <div class="lg:col-span-8 space-y-4 min-w-0">
                        <div class="table-responsive border border-gray-200 dark:border-gray-700 rounded-xl custom-scroll">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th style="width: 50px;">Select</th>
                                        <th>Position</th>
                                        <th>Recommended Stats (Base)</th>
                                        <th>Required Stats for <span id="target-eff-display" class="underline">100</span>% Eff</th>
                                    </tr>
                                </thead>
                                <tbody id="hiring-table-body"></tbody>
                            </table>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-gray-400 uppercase">HTML Forum Code</label>
                                <textarea id="h-html" readonly class="w-full h-32 p-2 text-[10px] font-mono rounded-lg bg-gray-50 dark:bg-gray-900 border"></textarea>
                                <button onclick="copyToClipboard('h-html')" class="w-full bg-emerald-600 text-white text-xs font-bold py-2 rounded-lg">Copy Code</button>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Live Preview</label>
                                <div id="h-preview" class="preview-area w-full h-32 p-3 rounded-lg overflow-auto text-xs"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <footer class="bg-gray-50 dark:bg-gray-900/50 border-t border-gray-200 dark:border-gray-700 p-4 text-center">
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">
                    Dev by <span class="text-blue-500">Jules AI</span> | <a href="https://github.com/chaba-xciv/Torn_Job_Post" class="hover:underline">GitHub</a>
                </p>
            </footer>
        </div>
    </div>

    <!-- Scripts -->
    <script src="company_specials.js"></script>
    <script src="company_positions.js"></script>
    <script>
        let jobsDB = [];
        let currentSort = { column: 'eff', asc: false };

        function init() {
            generateJobsDB();
            populateDropdowns();
            loadTheme();
            loadData();
            attachSaveListeners();
            renderWorkerTable();
            renderHiringTable();
        }

        function generateJobsDB() {
            jobsDB = [];
            for (const company in window.TORN_COMPANY_POSITIONS) {
                window.TORN_COMPANY_POSITIONS[company].forEach(pos => {
                    const stats = pos.recommended_stats;
                    const sorted = Object.entries(stats).sort((a, b) => b[1] - a[1]);
                    jobsDB.push({
                        c: company,
                        p: pos.rank,
                        reqP: sorted[0][1], typeP: sorted[0][0].toLowerCase(),
                        reqS: sorted[1][1], typeS: sorted[1][0].toLowerCase()
                    });
                });
            }
        }

        function populateDropdowns() {
            const hCompany = document.getElementById('h-company');
            const companies = [...new Set(jobsDB.map(job => job.c))].sort();
            companies.forEach(comp => hCompany.add(new Option(comp, comp)));
        }

        function switchTab(tab) {
            document.querySelectorAll('[id$="-content"]').forEach(c => c.classList.add('hidden'));
            document.getElementById(`${tab}-content`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-gray-400'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            document.querySelectorAll('nav button:not(.tab-active)').forEach(b => b.classList.add('text-gray-400'));
        }

        function getPartEff(stat, req) {
            if (req <= 0 || stat <= 0) return 0;
            const baseEff = Math.min(45, (45 / req) * stat);
            const bonus = Math.max(0, 5 * Math.log2(stat / req));
            return Math.floor(baseEff + bonus);
        }

        function renderWorkerTable() {
            const tbody = document.getElementById('worker-table-body');
            const man = parseFloat(document.getElementById('w-man').value) || 0;
            const int = parseFloat(document.getElementById('w-int').value) || 0;
            const end = parseFloat(document.getElementById('w-end').value) || 0;
            const merit = parseInt(document.getElementById('w-merit').value) || 0;
            const stats = { man, int, end };
            
            const filterComp = document.getElementById('w-filter-company').value.toLowerCase();
            const filterPos = document.getElementById('w-filter-position').value.toLowerCase();

            let data = jobsDB.map(job => {
                const eff = getPartEff(stats[job.typeP], job.reqP) + getPartEff(stats[job.typeS], job.reqS);
                return { ...job, eff };
            });

            if(filterComp) data = data.filter(j => j.c.toLowerCase().includes(filterComp));
            if(filterPos) data = data.filter(j => j.p.toLowerCase().includes(filterPos));

            data.sort((a, b) => {
                let vA = a[currentSort.column], vB = b[currentSort.column];
                if (typeof vA === 'string') { vA = vA.toLowerCase(); vB = vB.toLowerCase(); }
                return currentSort.asc ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
            });

            tbody.innerHTML = data.map(job => `
                <tr class="hover:bg-blue-50 dark:hover:bg-blue-900/20">
                    <td class="text-center"><input type="checkbox" class="worker-checkbox" value="${job.c}|${job.p}|${job.eff}"></td>
                    <td class="font-bold">${job.c}</td>
                    <td>${job.p}</td>
                    <td class="text-[10px] text-gray-500">${job.reqP.toLocaleString()} ${job.typeP.toUpperCase()} / ${job.reqS.toLocaleString()} ${job.typeS.toUpperCase()}</td>
                    <td class="text-center font-black text-blue-600">${job.eff}</td>
                </tr>
            `).join('');
        }

        function sortWorkerTable(col) {
            currentSort.asc = (currentSort.column === col) ? !currentSort.asc : (col !== 'eff');
            currentSort.column = col;
            renderWorkerTable();
        }

        function renderHiringTable() {
            const comp = document.getElementById('h-company').value;
            const targetEff = parseFloat(document.getElementById('h-eff').value) || 100;
            document.getElementById('target-eff-display').innerText = targetEff;
            
            const positions = jobsDB.filter(j => j.c === comp);
            const tbody = document.getElementById('hiring-table-body');

            tbody.innerHTML = positions.map(job => {
                const baseReqText = `${job.reqP.toLocaleString()} ${job.typeP.toUpperCase()} / ${job.reqS.toLocaleString()} ${job.typeS.toUpperCase()}`;
                
                let rP, rS;
                if (targetEff > 90) {
                    let mult = Math.pow(2, (targetEff - 90) / 10);
                    rP = Math.ceil(job.reqP * mult); rS = Math.ceil(job.reqS * mult);
                } else {
                    rP = Math.ceil((targetEff / 90) * job.reqP); rS = Math.ceil((targetEff / 90) * job.reqS);
                }
                const reqText = `${rP.toLocaleString()} ${job.typeP.toUpperCase()} / ${rS.toLocaleString()} ${job.typeS.toUpperCase()}`;
                return `
                    <tr class="hover:bg-blue-50 dark:hover:bg-blue-900/20">
                        <td class="text-center"><input type="checkbox" class="hiring-checkbox" value="${job.p}|${reqText}"></td>
                        <td class="font-bold">${job.p}</td>
                        <td class="text-blue-600 font-semibold">${baseReqText}</td>
                        <td class="font-black text-blue-600">${reqText}</td>
                    </tr>
                `;
            }).join('');
        }

        function generateWorkerHTML() {
            const man = document.getElementById('w-man').value;
            const int = document.getElementById('w-int').value;
            const end = document.getElementById('w-end').value;
            const merit = document.getElementById('w-merit').value;
            const style = document.querySelector('input[name="w-style"]:checked').value;
            const styleText = {salary: "Seeking Salary", tax: "Willing to Pay Tax", unpaid: "Unpaid/Perks"}[style];
            
            const selected = Array.from(document.querySelectorAll('.worker-checkbox:checked')).map(cb => {
                const [c, p, e] = cb.value.split('|');
                return `<li>${c} - ${p}: <b>${e}% eff</b> ${merit > 0 ? `(+${merit}% Merit)` : ''}</li>`;
            });

            const html = `
<div style="border: 2px solid #ddd; border-radius: 10px; padding: 15px; max-width: 500px; font-family: sans-serif; color: #333;">
    <h2 style="margin-top:0; border-bottom: 2px solid #eee; padding-bottom:5px; color:#2563eb;">📊 Worker Seeking Job</h2>
    <p><b>Stats:</b> MAN: ${Number(man).toLocaleString()} | INT: ${Number(int).toLocaleString()} | END: ${Number(end).toLocaleString()}</p>
    <p><b>Merits:</b> ${merit}/10 | <b>Pref:</b> ${styleText}</p>
    ${selected.length > 0 ? `<b>Targeting:</b><ul style="margin:5px 0; padding-left:20px;">${selected.join('')}</ul>` : '<i>Open to all offers!</i>'}
    ${document.getElementById('w-notes').value ? `<div style="margin-top:10px; padding:8px; background:#f8fafc; border-left:4px solid #cbd5e1; font-size:0.9rem;">${document.getElementById('w-notes').value.replace(/\n/g, '<br>')}</div>` : ''}
</div>`;
            document.getElementById('w-html').value = html.trim();
            document.getElementById('w-preview').innerHTML = html;
        }

        function generateHiringHTML() {
            const comp = document.getElementById('h-company').value;
            const eff = document.getElementById('h-eff').value;
            const stars = document.getElementById('h-stars').value;
            const link = document.getElementById('h-link').value;
            const style = document.querySelector('input[name="h-style"]:checked').value;
            const styleText = {paying: "Paying Salary", taxing: "Tax Required", unpaid: "Unpaid"}[style];

            const selected = Array.from(document.querySelectorAll('.hiring-checkbox:checked')).map(cb => {
                const [p, r] = cb.value.split('|');
                return `<li><b>${p}</b>: Req Stats: <i>${r}</i></li>`;
            });

            let perksHTML = "";
            if(stars > 0 && window.TORN_COMPANY_SPECIALS[comp]) {
                const specials = window.TORN_COMPANY_SPECIALS[comp].filter(s => s.stars <= stars);
                perksHTML = `<b>Perks Unlocked (${stars}⭐):</b><ul style="font-size:0.8rem; margin:5px 0;">` + 
                    specials.map(s => `<li>${s.stars}⭐ ${s.name}: ${s.effect}</li>`).join('') + `</ul>`;
            }

            const html = `
<div style="border: 2px solid #ddd; border-radius: 10px; padding: 15px; max-width: 500px; font-family: sans-serif; color: #333;">
    <h2 style="margin-top:0; border-bottom: 2px solid #eee; padding-bottom:5px; color:#2563eb;">🏢 Hiring: ${comp} (${stars}⭐)</h2>
    <p><b>Target:</b> ${eff}% Efficiency | <b>Offer:</b> ${styleText}</p>
    ${selected.length > 0 ? `<b>Open Roles:</b><ul style="margin:5px 0; padding-left:20px;">${selected.join('')}</ul>` : ''}
    ${perksHTML}
    ${document.getElementById('h-perks').value ? `<div style="margin-top:10px; padding:8px; background:#f8fafc; border-left:4px solid #cbd5e1;"><b>Info:</b><br>${document.getElementById('h-perks').value.replace(/\n/g, '<br>')}</div>` : ''}
    ${link ? `<div style="text-align:center; margin-top:15px;"><a href="${link}" style="background:#2563eb; color:white; padding:10px 20px; border-radius:6px; text-decoration:none; font-weight:bold;">Apply Here</a></div>` : ''}
</div>`;
            document.getElementById('h-html').value = html.trim();
            document.getElementById('h-preview').innerHTML = html;
        }

        function copyToClipboard(id) {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
            alert("Copied!");
        }

        function saveData() {
            const inputs = ['w-man', 'w-int', 'w-end', 'w-merit', 'w-notes', 'h-eff', 'h-link', 'h-perks', 'h-stars', 'h-company'];
            inputs.forEach(id => localStorage.setItem(id, document.getElementById(id).value));
            const wStyle = document.querySelector('input[name="w-style"]:checked');
            if(wStyle) localStorage.setItem('w-style', wStyle.value);
            const hStyle = document.querySelector('input[name="h-style"]:checked');
            if(hStyle) localStorage.setItem('h-style', hStyle.value);
        }

        function loadData() {
            const inputs = ['w-man', 'w-int', 'w-end', 'w-merit', 'w-notes', 'h-eff', 'h-link', 'h-perks', 'h-stars', 'h-company'];
            inputs.forEach(id => {
                const val = localStorage.getItem(id);
                if(val !== null) document.getElementById(id).value = val;
            });
            ['w-style', 'h-style'].forEach(name => {
                const val = localStorage.getItem(name);
                if(val) {
                    const rb = document.querySelector(`input[name="${name}"][value="${val}"]`);
                    if(rb) rb.checked = true;
                }
            });
        }

        function clearData() { if(confirm("Clear all?")) { localStorage.clear(); location.reload(); } }

        function setTheme(theme) {
            document.documentElement.classList.remove('dark');
            document.body.classList.remove('light-theme', 'dark-theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.body.classList.add('dark-theme');
            } else {
                document.body.classList.add('light-theme');
            }
            localStorage.setItem('site-theme', theme);
            const lBtn = document.getElementById('themeBtn-light'), dBtn = document.getElementById('themeBtn-dark');
            if(theme === 'dark') { dBtn.classList.add('text-blue-500'); lBtn.classList.remove('text-blue-500'); }
            else { lBtn.classList.add('text-blue-500'); dBtn.classList.remove('text-blue-500'); }
        }

        function loadTheme() {
            const saved = localStorage.getItem('site-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            setTheme(saved);
        }

        function attachSaveListeners() {
            document.querySelectorAll('input, select, textarea').forEach(el => {
                el.addEventListener('change', saveData);
                el.addEventListener('input', saveData);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
